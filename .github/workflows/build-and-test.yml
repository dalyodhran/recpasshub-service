name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Java/Gradle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Caches Gradle dependencies, wrapper, etc.
          # Restrict write privileges to default branches to avoid cache pollution from PRs
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Run Gradle Check & Tests
        run: ./gradlew check --no-daemon

      - name: Package BootJar (Verify Package)
        run: ./gradlew bootJar -x test --no-daemon

      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-reports
          path: build/reports/tests/
